<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>히라가나 마스터</title>
  
  <!-- Tailwind CSS (디자인) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React (기능) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
  
  <!-- 게임이 표시될 공간 -->
  <div id="root"></div>

  <!-- 게임 로직 (React) -->
  <script type="text/babel">
    const { useState } = React;

    // 히라가나 전체 데이터 (청음 기준 46자)
    const hiraganaData = [
      { hiragana: 'あ', romaji: 'a', korean: '아' }, { hiragana: 'い', romaji: 'i', korean: '이' }, { hiragana: 'う', romaji: 'u', korean: '우' }, { hiragana: 'え', romaji: 'e', korean: '에' }, { hiragana: 'お', romaji: 'o', korean: '오' },
      { hiragana: 'か', romaji: 'ka', korean: '카' }, { hiragana: 'き', romaji: 'ki', korean: '키' }, { hiragana: 'く', romaji: 'ku', korean: '쿠' }, { hiragana: 'け', romaji: 'ke', korean: '케' }, { hiragana: 'こ', romaji: 'ko', korean: '코' },
      { hiragana: 'さ', romaji: 'sa', korean: '사' }, { hiragana: 'し', romaji: 'shi', korean: '시' }, { hiragana: 'す', romaji: 'su', korean: '스' }, { hiragana: 'せ', romaji: 'se', korean: '세' }, { hiragana: 'そ', romaji: 'so', korean: '소' },
      { hiragana: 'た', romaji: 'ta', korean: '타' }, { hiragana: 'ち', romaji: 'chi', korean: '치' }, { hiragana: 'つ', romaji: 'tsu', korean: '츠' }, { hiragana: 'て', romaji: 'te', korean: '테' }, { hiragana: 'と', romaji: 'to', korean: '토' },
      { hiragana: 'な', romaji: 'na', korean: '나' }, { hiragana: 'に', romaji: 'ni', korean: '니' }, { hiragana: 'ぬ', romaji: 'nu', korean: '누' }, { hiragana: 'ね', romaji: 'ne', korean: '네' }, { hiragana: 'の', romaji: 'no', korean: '노' },
      { hiragana: 'は', romaji: 'ha', korean: '하' }, { hiragana: 'ひ', romaji: 'hi', korean: '히' }, { hiragana: 'ふ', romaji: 'fu', korean: '후' }, { hiragana: 'へ', romaji: 'he', korean: '헤' }, { hiragana: 'ほ', romaji: 'ho', korean: '호' },
      { hiragana: 'ま', romaji: 'ma', korean: '마' }, { hiragana: 'み', romaji: 'mi', korean: '미' }, { hiragana: 'む', romaji: 'mu', korean: '무' }, { hiragana: 'め', romaji: 'me', korean: '메' }, { hiragana: 'も', romaji: 'mo', korean: '모' },
      { hiragana: 'や', romaji: 'ya', korean: '야' }, { hiragana: 'ゆ', romaji: 'yu', korean: '유' }, { hiragana: 'よ', romaji: 'yo', korean: '요' },
      { hiragana: 'ら', romaji: 'ra', korean: '라' }, { hiragana: 'り', romaji: 'ri', korean: '리' }, { hiragana: 'る', romaji: 'ru', korean: '루' }, { hiragana: 'れ', romaji: 're', korean: '레' }, { hiragana: 'ろ', romaji: 'ro', korean: '로' },
      { hiragana: 'わ', romaji: 'wa', korean: '와' }, { hiragana: 'を', romaji: 'wo', korean: '오(조사)' }, { hiragana: 'ん', romaji: 'n', korean: '응' }
    ];

    function App() {
      const [gameState, setGameState] = useState('start'); // 'start', 'playing', 'end'
      const [score, setScore] = useState(0);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [shuffledQuestions, setShuffledQuestions] = useState([]);
      
      const TOTAL_QUESTIONS = hiraganaData.length;

      const shuffleArray = (array) => {
        const shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
      };

      const startGame = () => {
        const shuffledBase = shuffleArray(hiraganaData);
        
        const fullQuestions = shuffledBase.map(correctItem => {
          let wrongOptions = [];
          while (wrongOptions.length < 3) {
            const randomItem = hiraganaData[Math.floor(Math.random() * hiraganaData.length)];
            if (randomItem.hiragana !== correctItem.hiragana && !wrongOptions.find(item => item.hiragana === randomItem.hiragana)) {
              wrongOptions.push(randomItem);
            }
          }
          const allOptions = shuffleArray([correctItem, ...wrongOptions]);
          
          return {
            correctItem,
            options: allOptions,
            userAnswer: null,
            isCorrect: null
          };
        });

        setShuffledQuestions(fullQuestions);
        setCurrentIndex(0);
        setScore(0);
        setGameState('playing');
      };

      const handleAnswerClick = (selectedItem) => {
        const currentQ = shuffledQuestions[currentIndex];
        if (currentQ.userAnswer !== null) return;

        const isAnswerCorrect = selectedItem.hiragana === currentQ.correctItem.hiragana;
        
        const updatedQuestions = [...shuffledQuestions];
        updatedQuestions[currentIndex] = {
          ...currentQ,
          userAnswer: selectedItem,
          isCorrect: isAnswerCorrect
        };
        
        setShuffledQuestions(updatedQuestions);
        setScore(updatedQuestions.filter(q => q.isCorrect).length);
      };

      const goToPrev = () => {
        if (currentIndex > 0) setCurrentIndex(prev => prev - 1);
      };

      const goToNext = () => {
        if (currentIndex < TOTAL_QUESTIONS - 1) {
          setCurrentIndex(prev => prev + 1);
        } else if (shuffledQuestions[currentIndex].userAnswer !== null) {
          setGameState('end');
        }
      };

      const restartGame = () => {
        startGame();
      };

      const currentQ = shuffledQuestions[currentIndex];

      const getButtonClass = (item) => {
        const baseClass = "h-32 text-5xl font-bold rounded-2xl flex items-center justify-center transition-all duration-200 shadow-sm border-b-4 ";
        
        if (!currentQ || currentQ.userAnswer === null) {
          return baseClass + "bg-white text-gray-800 border-gray-200 hover:bg-blue-50 hover:border-blue-200 active:translate-y-1 active:border-b-0";
        }

        if (item.hiragana === currentQ.correctItem.hiragana) {
          return baseClass + "bg-green-100 text-green-700 border-green-300";
        }
        
        if (currentQ.userAnswer.hiragana === item.hiragana && item.hiragana !== currentQ.correctItem.hiragana) {
          return baseClass + "bg-red-100 text-red-700 border-red-300";
        }

        return baseClass + "bg-gray-50 text-gray-400 border-gray-100 opacity-50";
      };

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4 font-sans text-gray-800">
          
          {gameState === 'start' && (
            <div className="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full text-center">
              <div className="text-6xl mb-6">🇯🇵</div>
              <h1 className="text-3xl font-extrabold mb-2 text-indigo-900">히라가나 마스터</h1>
              <p className="text-gray-500 mb-8">발음을 보고 알맞은 히라가나를 맞춰보세요!<br/>수행평가 만점을 향해 가보자고🔥</p>
              <button 
                onClick={startGame}
                className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-8 rounded-xl text-xl transition-colors shadow-lg shadow-indigo-200"
              >
                퀴즈 시작하기
              </button>
            </div>
          )}

          {gameState === 'playing' && currentQ && (
            <div className="w-full max-w-md">
              <div className="flex justify-between items-center mb-6 px-2">
                <button 
                  onClick={restartGame} 
                  className="flex items-center gap-1 text-sm bg-gray-200 hover:bg-gray-300 text-gray-700 py-1.5 px-4 rounded-full font-bold transition-colors"
                >
                  🔄 다시 시작
                </button>
                <span className="text-gray-600 font-semibold bg-white px-4 py-1.5 rounded-full shadow-sm text-sm border border-gray-100">
                  내 점수: {score}점
                </span>
              </div>

              <div className="flex justify-between items-center mb-2 px-2">
                <span className="text-indigo-600 font-bold text-sm">
                  문제 {currentIndex + 1} / {TOTAL_QUESTIONS}
                </span>
              </div>

              <div className="bg-white rounded-3xl shadow-lg p-8 mb-6 text-center relative overflow-hidden">
                <div className="absolute top-0 left-0 w-full h-2 bg-indigo-100">
                  <div 
                    className="h-full bg-indigo-500 transition-all duration-300" 
                    style={{ width: `${(currentIndex / TOTAL_QUESTIONS) * 100}%` }}
                  ></div>
                </div>
                <p className="text-gray-400 text-sm font-semibold uppercase tracking-wider mb-2 mt-2">이 발음의 히라가나는?</p>
                <div className="flex flex-col items-center justify-center space-y-2">
                  <span className="text-5xl font-black text-indigo-900">{currentQ.correctItem.korean}</span>
                  <span className="text-2xl font-medium text-gray-500">[{currentQ.correctItem.romaji}]</span>
                </div>
              </div>

              <div className="h-12 flex items-center justify-center mb-4">
                 {currentQ.userAnswer !== null && (
                   <div className={`text-xl font-bold animate-bounce ${currentQ.isCorrect ? 'text-green-500' : 'text-red-500'}`}>
                     {currentQ.isCorrect ? '✨ 정답입니다!' : `❌ 앗, 정답은 '${currentQ.correctItem.hiragana}' 예요!`}
                   </div>
                 )}
              </div>

              <div className="grid grid-cols-2 gap-4">
                {currentQ.options.map((item, index) => (
                  <button
                    key={index}
                    onClick={() => handleAnswerClick(item)}
                    disabled={currentQ.userAnswer !== null}
                    className={getButtonClass(item)}
                  >
                    {item.hiragana}
                  </button>
                ))}
              </div>

              <div className="flex justify-between mt-8">
                 <button 
                   onClick={goToPrev}
                   disabled={currentIndex === 0}
                   className={`px-5 py-3 rounded-xl font-bold transition-colors shadow-sm ${currentIndex === 0 ? 'bg-gray-100 text-gray-400 cursor-not-allowed opacity-50' : 'bg-white text-indigo-600 border border-indigo-100 hover:bg-indigo-50 active:scale-95'}`}
                 >
                   ◀ 이전
                 </button>
                 
                 <button 
                   onClick={goToNext}
                   disabled={currentQ.userAnswer === null}
                   className={`px-5 py-3 rounded-xl font-bold transition-all duration-300 shadow-sm ${currentQ.userAnswer === null ? 'opacity-0 cursor-default pointer-events-none' : 'opacity-100 bg-indigo-600 text-white hover:bg-indigo-700 active:scale-95 animate-bounce'}`}
                 >
                   {currentIndex === TOTAL_QUESTIONS - 1 ? '결과 보기 ▶' : '다음 ▶'}
                 </button>
              </div>
            </div>
          )}

          {gameState === 'end' && (
            <div className="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full text-center">
              <div className="text-6xl mb-4">
                {score === TOTAL_QUESTIONS ? '🏆' : score >= TOTAL_QUESTIONS * 0.7 ? '👏' : '📚'}
              </div>
              <h2 className="text-3xl font-extrabold mb-2 text-indigo-900">퀴즈 완료!</h2>
              <p className="text-gray-500 mb-6">총 {TOTAL_QUESTIONS}문제 중</p>
              
              <div className="text-5xl font-black text-indigo-600 mb-8">
                {score} <span className="text-2xl text-gray-400">정답</span>
              </div>

              <p className="text-gray-600 font-medium mb-8 bg-gray-50 py-3 rounded-lg px-4 break-keep">
                {score === TOTAL_QUESTIONS 
                  ? '완벽해요! 수행평가 만점 예약이네요!' 
                  : score >= TOTAL_QUESTIONS * 0.7 
                  ? '아주 좋아요! 조금만 더 연습하면 완벽하겠어요.' 
                  : '괜찮아요! 반복해서 풀다보면 다 외워질 거예요.'}
              </p>

              <div className="flex gap-3">
                <button 
                  onClick={() => { setGameState('playing'); setCurrentIndex(0); }}
                  className="w-1/3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-4 px-4 rounded-xl text-md transition-colors shadow-sm"
                >
                  오답 확인
                </button>
                <button 
                  onClick={startGame}
                  className="w-2/3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-4 rounded-xl text-md transition-colors shadow-lg shadow-indigo-200"
                >
                  다시 도전하기
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // React 앱 실행
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
